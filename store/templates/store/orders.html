{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Кто купил товары</h2>

<table class="table table-striped table-bordered">
<thead class="table-dark">
<tr>
<th>Имя</th>
<th>Товар</th>
<th>Цена</th>
</tr>
</thead>

<tbody>

{% for order in orders %}

<tr>
<td>{{ order.name }}</td>
<td>{{ order.product }}</td>
<td>{{ order.price }}</td>
</tr>

{% endfor %}

</tbody>
</table>

{% endblock %}
